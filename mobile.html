<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <meta name="theme-color" content="#378ADD">
  <title>Dépôt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; min-height: 100vh; padding-bottom: 80px; }
    .header { background: #378ADD; color: white; padding: 16px; padding-top: 48px; font-size: 28px; font-weight: bold; }
    .stats-row { display: flex; background: white; padding: 16px; margin: 16px; border-radius: 12px; gap: 12px; }
    .stat { flex: 1; text-align: center; }
    .stat-val { font-size: 24px; font-weight: bold; color: #378ADD; }
    .stat-lbl { font-size: 12px; color: #8e8e93; }
    .add-section { margin: 16px; }
    .add-btn {
      width: 100%;
      padding: 18px;
      background: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 500;
      color: #378ADD;
      display: block;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .add-btn:active { background: #e8e8eb; }
    .search { margin: 0 16px 16px; }
    .search input { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; background: white; }
    .files { padding: 0 16px; }
    .file { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; }
    .file-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
    .file-name { flex: 1; margin-left: 12px; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { color: #8e8e93; font-size: 14px; }
    .file-del { background: none; border: none; font-size: 24px; color: #ccc; padding: 8px; }
    .file-del:active { color: #c0392b; }
    .notes { margin: 16px; background: white; border-radius: 12px; padding: 16px; }
    .notes h3 { margin: 0 0 12px 0; font-size: 16px; color: #8e8e93; }
    .notes textarea { width: 100%; height: 140px; border: none; font-size: 15px; resize: none; }
    .notes-save { width: 100%; padding: 14px; background: #378ADD; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 500; margin-top: 10px; }
    .notes-save:active { background: #2563a8; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; padding: 10px 0; border-top: 1px solid #ccc; }
    .tab { flex: 1; text-align: center; color: #8e8e93; font-size: 10px; }
    .tab-icon { font-size: 24px; display: block; margin-bottom: 2px; }
    .tab.active { color: #378ADD; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

<div class="header">📁 Dépôt</div>

<div class="stats-row">
  <div class="stat"><div class="stat-val" id="count">0</div><div class="stat-lbl">Fichiers</div></div>
  <div class="stat"><div class="stat-val" id="size">0</div><div class="stat-lbl">Taille</div></div>
  <div class="stat"><div class="stat-val" id="types">0</div><div class="stat-lbl">Types</div></div>
</div>

<div class="add-section">
  <label class="add-btn" for="fileInput">
    ➕ Ajouter un fichier
  </label>
  <input type="file" id="fileInput" multiple>
</div>

<div class="search">
  <input type="text" id="search" placeholder="Rechercher">
</div>

<div class="files" id="fileList"></div>

<div class="notes">
  <h3>📝 Notes</h3>
  <textarea id="noteContent" placeholder="Écrivez..."></textarea>
  <button class="notes-save" onclick="saveNotes()">Sauvegarder</button>
</div>

<div class="tabbar">
  <div class="tab active"><span class="tab-icon">📁</span>Fichiers</div>
  <div class="tab"><span class="tab-icon">➕</span>Ajouter</div>
  <div class="tab"><span class="tab-icon">📝</span>Notes</div>
</div>

<div class="toast" id="toast"></div>

<script>
// Charger les fichiers depuis localStorage
let files = JSON.parse(localStorage.getItem('depot-files') || '[]');

function getExt(n) { 
  return n.includes('.') ? n.split('.').pop().toLowerCase() : ''; 
}

function getColor(n) {
  const colors = {
    pdf: '#ffcdd2', jpg: '#f8bbd0', png: '#f8bbd0', 
    mp4: '#d1c4e9', zip: '#ffe0b2', txt: '#eeeeee',
    doc: '#bbdefb', xls: '#c8e6c9', png: '#f8bbd0'
  };
  const labels = {
    pdf: 'PDF', jpg: 'JPG', png: 'PNG', 
    mp4: 'VID', zip: 'ZIP', txt: 'TXT',
    doc: 'DOC', xls: 'XLS'
  };
  const e = getExt(n);
  return { bg: colors[e] || '#e8eaf6', label: labels[e] || e.toUpperCase().slice(0,3) || 'FIL' };
}

function formatSize(b) { 
  if (!b) return '0 o';
  if (b < 1024) return b + ' o';
  if (b < 1024 * 1024) return Math.round(b / 1024) + ' Ko';
  return (b / 1024 / 1024).toFixed(1) + ' Mo';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateStats() {
  document.getElementById('count').textContent = files.length;
  document.getElementById('size').textContent = formatSize(files.reduce((a, f) => a + (f.size || 0), 0));
  document.getElementById('types').textContent = new Set(files.map(f => getExt(f.name))).size;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = files.filter(x => x.name.toLowerCase().includes(q));
  const list = document.getElementById('fileList');
  
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">Aucun fichier<br><small>Appuyez sur "Ajouter un fichier"</small></div>';
    return;
  }
  
  list.innerHTML = filtered.map((file, i) => {
    const c = getColor(file.name);
    return `<div class="file">
      <div class="file-icon" style="background:${c.bg}">${c.label}</div>
      <div class="file-name">${file.name}</div>
      <div class="file-size">${formatSize(file.size)}</div>
      <button class="file-del" onclick="deleteFile(${i})">×</button>
    </div>`;
  }).join('');
}

function deleteFile(index) {
  if (!confirm('Supprimer ce fichier?')) return;
  files.splice(index, 1);
  saveFiles();
  updateStats();
  render();
  showToast('Fichier supprimé');
}

function saveFiles() {
  localStorage.setItem('depot-files', JSON.stringify(files));
}

function addFiles(newFiles) {
  if (!newFiles || newFiles.length === 0) return;
  
  newFiles.forEach(f => {
    files.push({ name: f.name, size: f.size });
  });
  
  saveFiles();
  updateStats();
  render();
  showToast(newFiles.length + ' fichier(s) ajouté(s)');
}

// Event listener pour le input file
document.getElementById('fileInput').addEventListener('change', function(e) {
  addFiles(this.files);
  this.value = ''; // Reset pour permettre de resélectionner les mêmes fichiers
});

document.getElementById('search').addEventListener('input', render);

document.getElementById('noteContent').value = localStorage.getItem('depot-notes') || '';

function saveNotes() {
  localStorage.setItem('depot-notes', document.getElementById('noteContent').value);
  showToast('Notes sauvegardées');
}

// Initialiser
updateStats();
render();
</script>

</body>
</html>
